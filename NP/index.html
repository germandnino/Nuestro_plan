<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  let auth, db;
  if (typeof firebaseConfig === 'undefined') {
    console.error("Error: firebase-config.js is missing or not configured. Please create NP/firebase-config.js from NP/firebase-config.example.js.");
    document.addEventListener("DOMContentLoaded", () => {
      const banner = document.getElementById("banner");
      if (banner) {
        banner.style.display = "block";
        banner.style.background = "#7a2222";
        banner.innerText = "Error: Falta 'firebase-config.js'. Configúralo desde 'firebase-config.example.js'.";
      }
    });
    // Dummy objects to prevent crash in app.js
    auth = {
      onAuthStateChanged: (cb) => { cb(null); return () => {}; },
      currentUser: null,
      signInWithEmailAndPassword: () => Promise.reject(new Error("Firebase no configurado")),
      signOut: () => Promise.resolve()
    };
    db = {
      collection: () => ({
        doc: () => ({
          onSnapshot: (cb) => { cb({ exists: false, data: () => null }); return () => {}; },
          set: () => Promise.reject(new Error("Firebase no configurado")),
          update: () => Promise.reject(new Error("Firebase no configurado"))
        })
      })
    };
  } else {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
  }
</script>
</head>
<body>
<div class="banner" id="banner">Sin acceso al almacenamiento; los datos no persisten.</div>

<!-- ONBOARDING -->

    <button class="btn gold" id="obNext">Continuar</button>
    <button class="btn ghost" id="obBack" style="display:none;">Volver</button>
    <button class="ob-skip" id="obSkip">Saltar y usar ejemplos</button>
  </div>
</div>

  <section class="sec" id="s2"><div class="wrap" id="r2"></div></section>

</div>

  <button class="nt nt-fab" data-action="menu"><div class="fab-ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>Acciones</button>
  <button class="nt" data-t="3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 01-2 2h0a2 2 0 01-2-2v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Aprender</button>
